<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Учёт продаж церковной лавки</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --primary: #2d6a4f;
      --accent: #40916c;
      --danger: #d00000;
      --text: #1c1c1c;
      --muted: #666;
      --border: #dcdcdc;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      margin: 0;
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
    }

    .nav-buttons button {
      background: #fff;
      color: var(--primary);
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      min-width: 80px;
      box-shadow: var(--shadow);
    }

    main {
      padding: 12px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .category-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .category-row h3 {
      margin: 0;
      font-size: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
      min-height: 44px;
      transition: transform 0.05s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-accent {
      background: var(--accent);
      color: #fff;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .product-button {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      min-height: 90px;
      text-align: left;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 15px;
    }

    .product-button strong {
      font-size: 17px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .tab {
      padding: 10px 14px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 15px;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }

    .tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .form-inline {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    input, select {
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      flex: 1;
      min-width: 140px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    th {
      background: #f1f1f1;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #fff;
      padding: 16px;
      border-radius: 14px;
      width: min(420px, 90vw);
      box-shadow: var(--shadow);
    }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      display: none;
      z-index: 30;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 480px) {
      header h1 { font-size: 16px; }
      .product-button { min-height: 80px; }
      .nav-buttons button { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Учёт продаж</h1>
    <div class="nav-buttons">
      <button id="nav-sales">Продажи</button>
      <button id="nav-settings">Настройки</button>
      <button id="nav-report">Итоги</button>
      <button id="nav-operations">Операции</button>
    </div>
  </header>
  <main>
    <!-- Экран продаж -->
    <section id="screen-sales" class="screen active">
      <div class="card">
        <div class="tabs" id="category-tabs"></div>
        <div class="product-grid" id="product-grid"></div>
      </div>
    </section>

    <!-- Экран настроек -->
    <section id="screen-settings" class="screen">
      <div class="card">
        <h2>Категории</h2>
        <div id="category-list"></div>
        <div class="form-inline" style="margin-top:12px;">
          <input type="text" id="new-category-name" placeholder="Новая категория" />
          <button class="btn btn-primary" id="add-category-btn">Добавить</button>
        </div>
      </div>
      <div class="card">
        <h2>Резервное копирование товаров</h2>
        <p class="muted" style="margin-top:0;">Сохраните список категорий и товаров в файл или загрузите ранее сохранённый.</p>
        <div class="actions" style="margin-top:8px; gap:8px;">
          <button class="btn btn-ghost" id="export-catalog">Сохранить список</button>
          <button class="btn btn-primary" id="import-catalog">Загрузить список</button>
        </div>
        <input type="file" id="catalog-file" accept="application/json" style="display:none;" />
      </div>
    </section>

    <!-- Экран отчёта -->
    <section id="screen-report" class="screen">
      <div class="card">
        <div class="actions" style="margin-bottom:10px;">
          <button class="btn btn-primary" id="download-report">Сохранить итоги</button>
          <button class="btn btn-danger" id="reset-shift">Сбросить смену</button>
        </div>
        <div id="report-summary"></div>
      </div>
    </section>

    <!-- Экран операций -->
    <section id="screen-operations" class="screen">
      <div class="card">
        <h2>Журнал операций</h2>
        <div id="operations-list"></div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="payment-modal">
    <div class="modal">
      <h3 id="payment-title">Оплата</h3>
      <p class="muted" id="payment-subtitle"></p>
      <div class="form-inline" style="margin-top: 8px;">
        <input type="number" id="payment-quantity" min="1" value="1" style="min-width:120px;" />
        <label id="price-input-wrap" style="display:none; flex:1;">
          <span class="muted" style="display:block; margin-bottom:4px;">Цена за единицу</span>
          <input type="number" id="payment-price" min="1" />
        </label>
      </div>
      <div class="category-row" style="margin-top:8px;">
        <span class="muted">Итого</span>
        <strong id="payment-total">0 ₽</strong>
      </div>
      <div class="actions" style="margin-top:12px;">
        <button class="btn btn-primary" id="pay-cash">Наличные</button>
        <button class="btn btn-accent" id="pay-qr">QR-код</button>
        <button class="btn btn-ghost" id="pay-cancel">Отмена</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Основные структуры данных
    const STORAGE_KEY = 'churchShopDataV1';
    let data = null;
    let currentCategoryId = null;
    let pendingProductId = null;
    let pendingProduct = null;

    function defaultData() {
      return {
        categories: [
          {
            id: 'cat-1',
            name: 'Свечки',
            products: [
              { id: 'p-1', name: 'Свеча 100', price: 100 },
              { id: 'p-2', name: 'Свеча 200', price: 200 },
              { id: 'p-3', name: 'Свеча 500', price: 500 },
            ],
          },
          {
            id: 'cat-2',
            name: 'Иконы',
            products: [
              { id: 'p-4', name: 'Икона 200', price: 200 },
              { id: 'p-5', name: 'Икона 400', price: 400 },
              { id: 'p-6', name: 'Икона 500', price: 500 },
            ],
          },
        ],
        sales: {}, // ключ productId: {cash: number, qr: number}
        salesLog: [],
      };
    }

    // Работа с localStorage
    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          data = JSON.parse(raw);
        } else {
          data = defaultData();
          saveData();
        }
      } catch (e) {
        console.error('Ошибка чтения данных', e);
        data = defaultData();
      }
      if (!data.sales) data.sales = {};
      if (!data.salesLog) data.salesLog = [];
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function migrateLegacySales() {
      if (data.salesLog.length) return;
      let migrated = false;
      Object.entries(data.sales || {}).forEach(([productId, counts]) => {
        const found = findProduct(productId);
        const productName = found?.product.name || 'Товар';
        const categoryName = found?.category.name || 'Категория';
        const price = found?.product.price || 0;
        if (counts.cash) {
          data.salesLog.push({
            id: generateId('log'),
            productId,
            productName,
            categoryName,
            price,
            quantity: counts.cash,
            method: 'cash',
            ts: Date.now(),
          });
          migrated = true;
        }
        if (counts.qr) {
          data.salesLog.push({
            id: generateId('log'),
            productId,
            productName,
            categoryName,
            price,
            quantity: counts.qr,
            method: 'qr',
            ts: Date.now(),
          });
          migrated = true;
        }
      });
      if (migrated) saveData();
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach((el) => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'screen-report') renderReport();
      if (id === 'screen-sales') renderSales();
      if (id === 'screen-settings') renderSettings();
      if (id === 'screen-operations') renderOperations();
    }

    // Вспомогательные функции
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function formatCurrency(num) {
      return new Intl.NumberFormat('ru-RU').format(num) + ' ₽';
    }

    function generateId(prefix) {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return `${prefix}-${crypto.randomUUID()}`;
      }
      return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    }

    function findProduct(productId) {
      for (const cat of data.categories) {
        const prod = cat.products.find((p) => p.id === productId);
        if (prod) return { product: prod, category: cat };
      }
      return null;
    }

    function rebuildSalesCounters() {
      const counters = {};
      data.salesLog.forEach((entry) => {
        if (!counters[entry.productId]) counters[entry.productId] = { cash: 0, qr: 0 };
        if (entry.method === 'cash') counters[entry.productId].cash += entry.quantity;
        if (entry.method === 'qr') counters[entry.productId].qr += entry.quantity;
      });
      data.sales = counters;
    }

    // Экран продаж
    function renderSales() {
      const tabs = document.getElementById('category-tabs');
      const grid = document.getElementById('product-grid');
      tabs.innerHTML = '';
      grid.innerHTML = '';

      if (!currentCategoryId && data.categories.length) {
        currentCategoryId = data.categories[0].id;
      }

      data.categories.forEach((cat) => {
        const tab = document.createElement('button');
        tab.className = 'tab' + (cat.id === currentCategoryId ? ' active' : '');
        tab.textContent = cat.name;
        tab.onclick = () => {
          currentCategoryId = cat.id;
          renderSales();
        };
        tabs.appendChild(tab);
      });

      const category = data.categories.find((c) => c.id === currentCategoryId);
      const products = category ? category.products : [];

      const counters = {};
      data.salesLog.forEach((entry) => {
        counters[entry.productId] = counters[entry.productId] || { total: 0 };
        counters[entry.productId].total += entry.quantity;
      });

      products.forEach((prod) => {
        const btn = document.createElement('button');
        btn.className = 'product-button';
        const priceLabel = prod.variablePrice ? 'Свободная цена' : formatCurrency(prod.price);
        btn.innerHTML = `<strong>${prod.name}</strong><span class="muted">${category.name}</span><span>${priceLabel}</span>`;
        btn.onclick = () => openPaymentModal(prod.id);

        const totalCount = counters[prod.id]?.total || 0;
        if (totalCount > 0) {
          const info = document.createElement('div');
          info.className = 'muted';
          info.textContent = `Продано: ${totalCount}`;
          btn.appendChild(info);
        }
        grid.appendChild(btn);
      });
    }

    function openPaymentModal(productId) {
      pendingProductId = productId;
      const found = findProduct(productId);
      if (!found) return;
      pendingProduct = found;
      const priceInputWrap = document.getElementById('price-input-wrap');
      const priceInput = document.getElementById('payment-price');
      document.getElementById('payment-title').textContent = found.product.name;
      document.getElementById('payment-subtitle').textContent = `${found.category.name} · ${
        found.product.variablePrice ? 'свободная цена' : formatCurrency(found.product.price)
      }`;
      document.getElementById('payment-quantity').value = 1;
      if (found.product.variablePrice) {
        priceInputWrap.style.display = 'block';
        priceInput.value = found.product.price || '';
      } else {
        priceInputWrap.style.display = 'none';
        priceInput.value = '';
      }
      updatePaymentTotal();
      document.getElementById('payment-modal').classList.add('active');
    }

    function closePaymentModal() {
      document.getElementById('payment-modal').classList.remove('active');
      pendingProductId = null;
      pendingProduct = null;
    }

    function registerSale(method) {
      if (!pendingProductId || !pendingProduct) return;
      const qtyInput = document.getElementById('payment-quantity');
      const priceInput = document.getElementById('payment-price');
      const quantity = Math.max(1, parseInt(qtyInput.value, 10) || 1);
      let price = pendingProduct.product.price;
      if (pendingProduct.product.variablePrice) {
        price = parseInt(priceInput.value, 10);
        if (!Number.isFinite(price) || price <= 0) {
          alert('Введите цену продажи');
          return;
        }
      }
      const logEntry = {
        id: generateId('log'),
        productId: pendingProduct.product.id,
        productName: pendingProduct.product.name,
        categoryName: pendingProduct.category.name,
        price,
        quantity,
        method,
        ts: Date.now(),
      };
      data.salesLog.push(logEntry);
      rebuildSalesCounters();
      saveData();
      closePaymentModal();
      renderSales();
      renderReport();
      renderOperations();
      showToast('Продажа записана');
    }

    function updatePaymentTotal() {
      if (!pendingProduct) return;
      const qty = Math.max(1, parseInt(document.getElementById('payment-quantity').value, 10) || 1);
      const unitPrice = pendingProduct.product.variablePrice
        ? parseInt(document.getElementById('payment-price').value, 10) || 0
        : pendingProduct.product.price;
      document.getElementById('payment-total').textContent = formatCurrency(Math.max(0, unitPrice) * qty);
    }

    // Экран настроек
    function renderSettings() {
      const list = document.getElementById('category-list');
      list.innerHTML = '';

      data.categories.forEach((cat) => {
        const block = document.createElement('div');
        block.className = 'card';

        const header = document.createElement('div');
        header.className = 'category-row';
        const title = document.createElement('h3');
        title.textContent = cat.name;

        const actions = document.createElement('div');
        const renameBtn = document.createElement('button');
        renameBtn.className = 'btn btn-ghost';
        renameBtn.textContent = 'Переименовать';
        renameBtn.onclick = () => {
          const newName = prompt('Новое название категории', cat.name);
          if (newName && newName.trim()) {
            cat.name = newName.trim();
            saveData();
            renderSettings();
            renderSales();
          }
        };

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn btn-danger';
        deleteBtn.textContent = 'Удалить';
        deleteBtn.onclick = () => {
          const ok = confirm('Удалить категорию и все товары?');
          if (!ok) return;
          data.categories = data.categories.filter((c) => c.id !== cat.id);
          cat.products.forEach((p) => delete data.sales[p.id]);
          if (currentCategoryId === cat.id) currentCategoryId = data.categories[0]?.id || null;
          saveData();
          renderSettings();
          renderSales();
        };
        actions.append(renameBtn, deleteBtn);

        header.append(title, actions);
        block.appendChild(header);

        const productsWrap = document.createElement('div');
        cat.products.forEach((prod) => {
          const row = document.createElement('div');
          row.className = 'category-row';
          const info = document.createElement('div');
          const priceInfo = prod.variablePrice ? 'Свободная цена' : formatCurrency(prod.price);
          info.innerHTML = `<strong>${prod.name}</strong><div class="muted">${priceInfo}</div>`;

          const btns = document.createElement('div');
          const editBtn = document.createElement('button');
          editBtn.className = 'btn btn-ghost';
          editBtn.textContent = 'Изменить';
          editBtn.onclick = () => {
            const newName = prompt('Название товара', prod.name);
            if (!newName) return;
            const newPrice = prompt('Цена, руб', prod.price);
            if (!newPrice || isNaN(newPrice)) return alert('Введите число');
            const variable = confirm('Цена изменяемая? (ОК - да, Отмена - нет)');
            prod.name = newName.trim();
            prod.price = parseInt(newPrice, 10);
            prod.variablePrice = variable;
            saveData();
            renderSettings();
            renderSales();
          };

          const delBtn = document.createElement('button');
          delBtn.className = 'btn btn-danger';
          delBtn.textContent = 'Удалить';
          delBtn.onclick = () => {
            const ok = confirm('Удалить товар?');
            if (!ok) return;
            cat.products = cat.products.filter((p) => p.id !== prod.id);
            delete data.sales[prod.id];
            saveData();
            renderSettings();
            renderSales();
          };
          btns.append(editBtn, delBtn);
          row.append(info, btns);
          productsWrap.appendChild(row);
        });
        block.appendChild(productsWrap);

        const form = document.createElement('div');
        form.className = 'form-inline';
        form.innerHTML = `
          <input type="text" placeholder="Новый товар" data-cat="${cat.id}" class="prod-name" />
          <input type="number" placeholder="Цена" data-cat="${cat.id}" class="prod-price" />
          <label style="display:flex; align-items:center; gap:6px;">
            <input type="checkbox" data-cat="${cat.id}" class="prod-variable" />
            Свободная цена
          </label>
          <button class="btn btn-primary" data-cat="${cat.id}">Добавить</button>
        `;
        const addBtn = form.querySelector('button');
        addBtn.onclick = () => {
          const nameInput = form.querySelector('.prod-name');
          const priceInput = form.querySelector('.prod-price');
          const variableInput = form.querySelector('.prod-variable');
          const name = nameInput.value.trim();
          const price = parseInt(priceInput.value, 10);
          const variablePrice = variableInput.checked;
          if (!name) return alert('Введите название');
          if (!variablePrice && (isNaN(price) || price <= 0)) return alert('Введите цену в рублях');
          const newProd = { id: generateId('p'), name, price: Number.isFinite(price) ? price : 0, variablePrice };
          cat.products.push(newProd);
          saveData();
          nameInput.value = '';
          priceInput.value = '';
          variableInput.checked = false;
          renderSettings();
          renderSales();
        };

        block.appendChild(form);
        list.appendChild(block);
      });
    }

    function exportCatalog() {
      const payload = { categories: data.categories };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const now = new Date();
      a.download = `catalog-${now.toISOString().slice(0, 10)}.json`;
      a.href = url;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Список сохранён');
    }

    function importCatalogFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!parsed || !Array.isArray(parsed.categories)) throw new Error('Неверный формат файла');
          const sanitizedCategories = parsed.categories.map((cat) => ({
            id: cat.id || generateId('cat'),
            name: cat.name || 'Без названия',
            products: Array.isArray(cat.products)
              ? cat.products.map((p) => ({
                  id: p.id || generateId('p'),
                  name: p.name || 'Товар',
                  price: Number.isFinite(p.price) && p.price > 0 ? Math.round(p.price) : 0,
                  variablePrice: !!p.variablePrice,
                }))
              : [],
          }));
          data.categories = sanitizedCategories;
          data.sales = {};
          data.salesLog = [];
          saveData();
          renderSettings();
          renderSales();
          renderOperations();
          showToast('Список товаров восстановлен');
        } catch (err) {
          alert('Не удалось загрузить файл: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // Итоги
    function computeReport() {
      const productRows = [];
      const categoryTotals = {};
      let cashTotal = 0;
      let qrTotal = 0;

      const productAggregates = {};
      data.categories.forEach((cat) => {
        cat.products.forEach((prod) => {
          productAggregates[prod.id] = {
            category: cat.name,
            name: prod.name,
            price: prod.price,
            cashCount: 0,
            qrCount: 0,
            cashSum: 0,
            qrSum: 0,
          };
        });
      });

      data.salesLog.forEach((entry) => {
        const found = findProduct(entry.productId);
        const categoryName = found?.category.name || entry.categoryName || 'Без категории';
        const productName = found?.product.name || entry.productName || 'Товар';
        const displayPrice = found?.product.price ?? entry.price;
        if (!productAggregates[entry.productId]) {
          productAggregates[entry.productId] = {
            category: categoryName,
            name: productName,
            price: displayPrice,
            cashCount: 0,
            qrCount: 0,
            cashSum: 0,
            qrSum: 0,
          };
        }
        const agg = productAggregates[entry.productId];
        agg.category = categoryName;
        agg.name = productName;
        agg.price = displayPrice;
        const saleSum = entry.price * entry.quantity;
        if (entry.method === 'cash') {
          agg.cashCount += entry.quantity;
          agg.cashSum += saleSum;
        } else {
          agg.qrCount += entry.quantity;
          agg.qrSum += saleSum;
        }
      });

      Object.values(productAggregates).forEach((agg) => {
        const totalCount = agg.cashCount + agg.qrCount;
        const totalSum = agg.cashSum + agg.qrSum;
        productRows.push({
          category: agg.category,
          name: agg.name,
          price: agg.price,
          cashCount: agg.cashCount,
          qrCount: agg.qrCount,
          totalCount,
          cashSum: agg.cashSum,
          qrSum: agg.qrSum,
          totalSum,
        });

        if (!categoryTotals[agg.category]) {
          categoryTotals[agg.category] = { sum: 0, count: 0 };
        }
        categoryTotals[agg.category].sum += totalSum;
        categoryTotals[agg.category].count += totalCount;
        cashTotal += agg.cashSum;
        qrTotal += agg.qrSum;
      });

      const grandTotal = cashTotal + qrTotal;
      return { productRows, categoryTotals, cashTotal, qrTotal, grandTotal };
    }

    function renderReport() {
      const { productRows, categoryTotals, cashTotal, qrTotal, grandTotal } = computeReport();
      const container = document.getElementById('report-summary');
      container.innerHTML = '';

      const itemsCard = document.createElement('div');
      itemsCard.className = 'card';
      itemsCard.innerHTML = '<h3>По товарам</h3>';
      const table = document.createElement('table');
      table.innerHTML = `
        <thead>
          <tr>
            <th>Категория</th>
            <th>Товар</th>
            <th>Цена</th>
            <th>Нал (шт)</th>
            <th>QR (шт)</th>
            <th>Всего</th>
            <th>Нал</th>
            <th>QR</th>
            <th>Итого</th>
          </tr>
        </thead>
        <tbody>
          ${productRows
            .map(
              (r) => `
              <tr>
                <td>${r.category}</td>
                <td>${r.name}</td>
                <td>${formatCurrency(r.price)}</td>
                <td>${r.cashCount}</td>
                <td>${r.qrCount}</td>
                <td>${r.totalCount}</td>
                <td>${formatCurrency(r.cashSum)}</td>
                <td>${formatCurrency(r.qrSum)}</td>
                <td>${formatCurrency(r.totalSum)}</td>
              </tr>`
            )
            .join('')}
        </tbody>`;
      itemsCard.appendChild(table);
      container.appendChild(itemsCard);

      const catCard = document.createElement('div');
      catCard.className = 'card';
      catCard.innerHTML = '<h3>По категориям</h3>';
      const catList = document.createElement('div');
      for (const [name, totals] of Object.entries(categoryTotals)) {
        const row = document.createElement('div');
        row.className = 'category-row';
        row.innerHTML = `<span>${name} · ${totals.count} шт</span><strong>${formatCurrency(totals.sum)}</strong>`;
        catList.appendChild(row);
      }
      catCard.appendChild(catList);
      container.appendChild(catCard);

      const totalsCard = document.createElement('div');
      totalsCard.className = 'card';
      totalsCard.innerHTML = `
        <h3>Оплаты</h3>
        <div class="category-row"><span>Наличные</span><strong>${formatCurrency(cashTotal)}</strong></div>
        <div class="category-row"><span>QR-код</span><strong>${formatCurrency(qrTotal)}</strong></div>
        <hr style="border:0;border-top:1px solid var(--border);margin:10px 0;" />
        <div class="category-row"><span>Итого</span><strong>${formatCurrency(grandTotal)}</strong></div>
      `;
      container.appendChild(totalsCard);
    }

    function resetShift() {
      const ok = confirm('Сбросить все продажи за смену?');
      if (!ok) return;
      data.sales = {};
      data.salesLog = [];
      saveData();
      renderReport();
      renderSales();
      renderOperations();
      showToast('Смена сброшена');
    }

    function downloadReport() {
      const { productRows, categoryTotals, cashTotal, qrTotal, grandTotal } = computeReport();
      const lines = [];
      const now = new Date();
      lines.push(`Отчёт,${now.toLocaleString('ru-RU')}`);
      lines.push('---');
      lines.push('Категория,Товар,Цена,Нал (шт),QR (шт),Всего (шт),Нал (сумма),QR (сумма),Итого');
      productRows.forEach((r) => {
        lines.push(`${r.category},${r.name},${r.price},${r.cashCount},${r.qrCount},${r.totalCount},${r.cashSum},${r.qrSum},${r.totalSum}`);
      });
      lines.push('---');
      lines.push('Итоги по категориям');
      lines.push('Категория,Количество,Сумма');
      Object.entries(categoryTotals).forEach(([name, totals]) => {
        lines.push(`${name},${totals.count},${totals.sum}`);
      });
      lines.push('---');
      lines.push(`Наличные,${cashTotal}`);
      lines.push(`QR-код,${qrTotal}`);
      lines.push(`Итого,${grandTotal}`);

      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const fileName = `otchet-${now.toISOString().slice(0, 19).replace(/[:T]/g, '-')}.csv`;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Отчёт сохранён');
    }

    // Навигация
    document.getElementById('nav-sales').onclick = () => showScreen('screen-sales');
    document.getElementById('nav-settings').onclick = () => showScreen('screen-settings');
    document.getElementById('nav-report').onclick = () => showScreen('screen-report');
    document.getElementById('nav-operations').onclick = () => showScreen('screen-operations');

    // Модал оплаты
    document.getElementById('pay-cash').onclick = () => registerSale('cash');
    document.getElementById('pay-qr').onclick = () => registerSale('qr');
    document.getElementById('pay-cancel').onclick = closePaymentModal;
    document.getElementById('payment-modal').onclick = (e) => {
      if (e.target.id === 'payment-modal') closePaymentModal();
    };
    document.getElementById('payment-quantity').addEventListener('input', updatePaymentTotal);
    document.getElementById('payment-price').addEventListener('input', updatePaymentTotal);

    // Настройки
    document.getElementById('add-category-btn').onclick = () => {
      const name = document.getElementById('new-category-name').value.trim();
      if (!name) return alert('Введите название категории');
      data.categories.push({ id: generateId('cat'), name, products: [] });
      document.getElementById('new-category-name').value = '';
      saveData();
      renderSettings();
      renderSales();
    };

    document.getElementById('export-catalog').onclick = exportCatalog;
    document.getElementById('import-catalog').onclick = () => document.getElementById('catalog-file').click();
    document.getElementById('catalog-file').onchange = (e) => {
      const [file] = e.target.files || [];
      if (file) importCatalogFile(file);
      e.target.value = '';
    };

    document.getElementById('reset-shift').onclick = resetShift;
    document.getElementById('download-report').onclick = downloadReport;

    // Журнал операций
    function renderOperations() {
      const container = document.getElementById('operations-list');
      container.innerHTML = '';
      if (!data.salesLog.length) {
        container.innerHTML = '<p class="muted" style="margin:0;">Пока нет продаж</p>';
        return;
      }
      const sorted = [...data.salesLog].sort((a, b) => b.ts - a.ts);
      sorted.forEach((entry) => {
        const row = document.createElement('div');
        row.className = 'category-row';
        const info = document.createElement('div');
        const method = entry.method === 'cash' ? 'Наличные' : 'QR';
        const date = new Date(entry.ts).toLocaleString('ru-RU');
        const total = formatCurrency(entry.price * entry.quantity);
        info.innerHTML = `<strong>${entry.productName}</strong><div class="muted">${entry.categoryName || '—'} · ${
          method
        } · ${entry.quantity} шт · ${formatCurrency(entry.price)} за шт · ${total}</div><div class="muted">${date}</div>`;
        const undoBtn = document.createElement('button');
        undoBtn.className = 'btn btn-ghost';
        undoBtn.textContent = 'Отменить';
        undoBtn.onclick = () => undoOperation(entry.id);
        row.append(info, undoBtn);
        container.appendChild(row);
      });
    }

    function undoOperation(id) {
      const idx = data.salesLog.findIndex((e) => e.id === id);
      if (idx === -1) return;
      data.salesLog.splice(idx, 1);
      rebuildSalesCounters();
      saveData();
      renderOperations();
      renderSales();
      renderReport();
      showToast('Операция отменена');
    }

    // Инициализация
    loadData();
    migrateLegacySales();
    rebuildSalesCounters();
    renderSales();
    renderSettings();
    renderOperations();
  </script>
</body>
</html>
